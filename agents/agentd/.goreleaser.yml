version: 2

project_name: agentd

builds:
  - id: agentd
    main: ./cmd/agentd
    binary: agentd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{ .Version }}

archives:
  - ids:
      - agentd
    formats:
      - tar.gz
    name_template: "agentd_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - '^chore:'
      - '^docs:'
      - '^test:'

release:
  prerelease: auto
