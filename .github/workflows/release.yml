name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
        env:
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-secret
          CONTROL_PLANE_JWT_SECRET: ci-secret
          NEXT_PUBLIC_CONTROL_PLANE_URL: http://localhost:8080
          NEXT_PUBLIC_CONTROL_PLANE_WS_URL: ws://localhost:8080/v1/ui/stream

      - name: Go build
        working-directory: agents/agentd
        run: go build ./...

      - name: Go vet
        working-directory: agents/agentd
        run: go vet ./...

      - name: Go test
        working-directory: agents/agentd
        run: go test ./...

      - name: Build and publish agentd binaries
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
          workdir: agents/agentd
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
