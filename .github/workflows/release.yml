name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22.x'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
        env:
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-secret
          CONTROL_PLANE_JWT_SECRET: ci-secret
          NEXT_PUBLIC_CONTROL_PLANE_URL: http://localhost:8080
          NEXT_PUBLIC_CONTROL_PLANE_WS_URL: ws://localhost:8080/v1/ui/stream

      - name: Go build
        working-directory: agents/agentd
        run: go build ./...

      - name: Go vet
        working-directory: agents/agentd
        run: go vet ./...

      - name: Go test
        working-directory: agents/agentd
        run: go test ./...

      - name: Extract release notes from CHANGELOG
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]" { found = 1; next }
            found && /^## \[/ { exit }
            found { print }
            END { if (!found) exit 1 }
          ' CHANGELOG.md > release-notes.md
          test -s release-notes.md

      - name: Build and publish agentd binaries
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean --release-notes ${{ github.workspace }}/release-notes.md
          workdir: agents/agentd
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publish the Android APK as a release asset alongside the agentd binaries,
      # with its checksum, so the artifact has a durable home outside git history.
      - name: Attach Android APK to release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          apk="android-distribution/agent-command-android.apk"
          if [ ! -f "$apk" ]; then
            echo "No APK at $apk; skipping asset upload."
            exit 0
          fi
          sha256sum "$apk" | awk '{print $1}' > "$apk.sha256"
          gh release upload "$GITHUB_REF_NAME" "$apk" "$apk.sha256" --clobber
