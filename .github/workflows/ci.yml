name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  node:
    name: Node build + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
        env:
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-secret
          CONTROL_PLANE_JWT_SECRET: ci-secret
          NEXT_PUBLIC_CONTROL_PLANE_URL: http://localhost:8080
          NEXT_PUBLIC_CONTROL_PLANE_WS_URL: ws://localhost:8080/v1/ui/stream

      - name: Workspace tests (schema, control plane, CLI, dashboard)
        run: pnpm test:ci

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Dashboard smoke
        run: pnpm test:smoke:dashboard

  go:
    name: Go build + vet + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22.x'

      - name: Build
        working-directory: agents/agentd
        run: go build ./...

      - name: Vet
        working-directory: agents/agentd
        run: go vet ./...

      - name: Test
        working-directory: agents/agentd
        run: go test ./...

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build control-plane image
        run: docker build -f deploy/Dockerfile.control-plane.base -t agent-commander-control-plane .

      - name: Build dashboard image
        run: docker build -f deploy/Dockerfile.dashboard.base -t agent-commander-dashboard .
